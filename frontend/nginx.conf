# Nginx configuration file for the Thrifter frontend application. It sets up a server that listens on port 80 and serves static files from the /usr/share/nginx/html directory. It also includes proxy settings to forward API requests to the backend server running on port 8000, and to serve images from the backend as well.
server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
    }

    location /images/ {
        proxy_pass http://backend:8000/images/;
    }
}
